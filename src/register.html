<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Register Page" />

        <link rel="stylesheet" href="./css/styles.css" />

        <script type="module">
            import App from './js/register.js';

            const app = new App();
        </script>
    </head>
    <body>
        <div class="login-wrapper">
            <main>
                <form id="login">
                    <p class="form-error hidden" id="error-message"></p>
                    <div class="form-element">
                        <label class="form-label" for="first-name">First Name</label>
                        <input class="form-text" type="text" name="first-name" id="first-name" />
                    </div>
                    <div class="form-element">
                        <label class="form-label" for="last-name">Last Name</label>
                        <input class="form-text" type="text" name="last-name" id="last-name" />
                    </div>
                    <div class="form-element">
                        <label class="form-label" for="username">Username</label>
                        <input class="form-text" type="text" name="username" id="username" />
                    </div>
                    <div class="form-element">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-text" type="password" name="password" id="password" />
                    </div>
                    <div class="form-element">
                        <label class="form-label" for="confirm-password">Confirm Password</label>
                        <input class="form-text" type="password" name="confirm-password" id="confirm-password" />
                    </div>
                    <div class="form-element">
                        <button class="login-button">Register</button>
                    </div>
                </form>
                <p>Already have an account? <a href="login.html">Login Here.</a></p>
            </main>
        </div>
    </body>
</html>
