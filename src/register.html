<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css" />
    <title>Register</title>

    <script type="module">
        import setup from "./js/register.js";
        setup();
    </script>
</head>
<body>
    <main>
        <h1>Welcome to Better IMDB</h1>

        <section>
            <h2>Register</h2>
            <div>
                <form class="form-error hidden" id="error-message">
                    Invalid Username or Password
                </form>
                <form class="no-submit">
                    <label for="username">Username</label>
                    <input id="username" type="text" name="username" />
                </form class="no-submit">
                <form class="no-submit">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" />
                </form>
                <form class="no-submit">
                    <label for="reenter-password">Reenter Password</label>
                    <input id="confirm-password" type="password" name="reenter-password" />
                </form>
                <button type="button" id="register">Register Account</button>
            </div>

            <p>Already Registered? <a href="./login.html">sign in</a></p>
        </section>

    </main>
</body>
</html>
