<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css" />
    <title>Register</title>

    <script type="module">
        import App from "./js/register.js";
        new App();
    </script>
</head>
<body id="register-page">
    <main>
        <h1>Welcome to IMDB</h1>

        <section>
            <h2>Register</h2>
            <form id="register">
                <div class="form-error hidden" id="error-message">Invalid Username or Password</div>
                
                <div class="form-element">
                    <label for="username">Username</label>
                    <input id="username" type="text" name="username" />
                </div>
                
                <div class="form-element">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" />
                </div>
            
                <div class="form-element">
                    <label for="reenter-password">Reenter Password</label>
                    <input id="confirm-password" type="password" name="reenter-password" />
                </div>
            
                <div class="form-element">
                    <button type="submit" class="register-button">Register Account</button>
                </div>
            </form>

            <p>Already Registered? <a href="./login.html">sign in</a></p>
        </section>

    </main>
</body>
</html>
