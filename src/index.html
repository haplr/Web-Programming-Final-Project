<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="description" content="Better IMDB Homepage" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>Home</title>
    <body class="home-page"></body>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body { display: flex; flex-direction: column; min-height: 100vh; }

      main {
        flex: 1;
        display: grid;
        grid-template-columns: 300px 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 8px;
        padding: 8px;
      }

      #actor-panel  { grid-column: 1; grid-row: 1 / 3; }
      #trending     { grid-column: 2; grid-row: 1; }
      #what-to-watch{ grid-column: 2; grid-row: 2; }
    </style>
  </head>
  <body>
    <header>
      <nav class="navbar">
        <ul class="nav-links">
          <li><a href="./index.html">Home</a></li>
          <li><a href="./account.html">My Account</a></li>
          <li><a href="./watch-list.html">Watchlist</a></li>
          <li><a href="./login.html">Log Out</a></li>
        </ul>
        <form id="search-container">
          <fieldset>
              <input id="search" name="search" type="search" placeholder="Enter a movie name or a person name..." />
              <button type='submit'>Search</button>
          </fieldset>
      </form>
      </nav>
    </header>

    <main>
      <div id="actor-panel">
        <h2>Actor Name</h2>
        <img src="" alt="Actor photo" />
        <p>Avg Score: </p>
        <h3>Movies / Shows</h3>
        <ul>
          <li>Movie Title</li>
          <li>Movie Title</li>
          <li>Movie Title</li>
        </ul>
        <h3>Upcoming Projects</h3>
        <ul>
          <li>Project Title</li>
        </ul>
      </div>

      <div id="trending">
        <h2>Trending</h2>
        <div class="trending-item">
          <img src="" alt="Movie poster" />
          <div class="trending-info">
            <h3>Movie Title</h3>
            <p>Score: </p>
            <p>Director(s): </p>
            <p>Actor(s): </p>
            <a href="watch-list.html">Watchlist</a>
          </div>
        </div>
      </div>

      <div id="watchlist">
        <h2>Watchlist</h2>
        <div class="movie-list">
          <div class="movie-card">
            <img src="" alt="Movie poster" />
            <p>Movie Title</p>
          </div>
        </div>
      </div>

    </main>

    <footer>
    </footer>
    <script src="js/homepage.js"></script>
  </body>
</html>
