<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css" />
    <title>BetterIMDB | Login</title>

    <script type="module">
        import setup from './js/login.js'

        setup();
    </script>
</head>
<body>
    <main>
        <h1>Welcome to Better IMDB</h1>

        <section>
            <h2>Sign in</h2>
            <form>
                <div class="form-error hidden" id="error-message">
                    <p>Invalid Username or Password</p>
                </div>
                <div class="form-element">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-text" type="text" name="username" id="username" />
                </div>
                <div class="form-element">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-text" type="password" name="password" id="password" />
                </div>
                <div class="form-element">
                    <button class="login-button" type="button" id="login">Login</button>
                </div>
            </form>

            <p>Not Registered? <a href="./register.html">Register Here</a></p>
        </section>
    </main>
</body>
</html>
