<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css" />
    <title>Login</title>

    <script type="module">
        import setup from './js/login.js'
        setup();
    </script>
</head>
<body>
    <main>
        <h1>Welcome to Better IMDB</h1>

        <section>
            <h2>Sign in</h2>
            <div>
                <form class="no-submit form-error hidden" id="error-message">
                    <p>Invalid Username or Password</p>
                </form>
                <form class="no-submit form-element">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-text" type="text" name="username" id="username" />
                </form>
                <form class="no-submit form-element">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-text" type="password" name="password" id="password" />
                </form>
                <form class="no-submit form-element">
                    <button id="login" type="button">Login</button>
                </form>
            </div>

            <p>Not Registered? <a href="./register.html">Register Here</a></p>
        </section>
    </main>
</body>
</html>
