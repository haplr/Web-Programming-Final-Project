<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetterIMDB | Person List</title>
</head>
<body>
    <main>
        <h1>Welcome to Person List</h1>
        <section>
            <span id="#person-list-button-wrapper">
                <button class="person-list-button">Toggle Actors</button>
                <button class="person-list-button">Toggle Director</button>
                <button class="person-list-button">Toggle Both</button>
            </span>
        </section>
        <section>
            <table id="#person-list-table">
                <tr>
                    <th>Person Name</th>
                    <th>Date of Birth</th>
                    <th>Bio</th>
                    <th>Movies</th>
                    <th>Roles</th>
                </tr>
            </table>
        </section>
    </main>
</body>
</html>
