<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account</title>
</head>
<body>
    <main>
        <section id="account-title-wrapper">
            <h1>Your Account</h1>
        </section>
        <section id="account-button-wrapper">
            <div>
                <button>Watch List</button>
                <p>List of movies added by the user</p>
            </div>
            <div>
                <button>Favorited Actors</button>
                <p>List of actors favorited by the user</p>
            </div>
            <div>
                <button>Follow List</button>
                <p>List of users you follow</p>
            </div>
            <div>
                <button>Follower List</button>
                <p>List of users that follow you</p>
            </div>
            <div>
                <button>Login & Security</button>
                <p>Login and Security page</p>
            </div>
        </section>
    </main>
</body>
</html>
