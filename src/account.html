<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css" />
    <title>Account</title>
</head>
<body id="account-page">
    <main>
        <section id="account-title-wrapper">
            <p><b>Your Account</b></p>
            <div>
                <p>Followers ...</p>
                <p>Follows ...</p>
            </div>
            
        </section>
        <section id="account-button-wrapper">
            <div>
                <button class="account-button">Watch List</button>
                <p>List of movies added by the user</p>
            </div>
            <div>
                <button class="account-button">Favorited Actors</button>
                <p>List of actors favorited by the user</p>
            </div>
            <div>
                <button class="account-button">Follow List</button>
                <p>List of users you follow</p>
            </div>
            <div>
                <button class="account-button">Follower List</button>
                <p>List of users that follow you</p>
            </div>
            <div>
                <button class="account-button">Login & Security</button>
                <p>Login and security page</p>
            </div>
        </section>
    </main>
</body>
</html>
